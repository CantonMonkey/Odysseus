<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odysseus — 家居导航机器人</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 10px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  #status-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    background: #333;
    color: #aaa;
    transition: all 0.3s;
  }
  #status-badge.navigating { background: #1a3a1a; color: #4caf50; }
  #status-badge.arrived    { background: #1a2a3a; color: #64b5f6; }
  #status-badge.timeout    { background: #3a1a1a; color: #ef9a9a; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 330px 260px;
    grid-template-rows: 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Ego RGB panel ── */
  #video-panel {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-right: 1px solid #222;
  }
  #canvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  #nav-info {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.65);
    padding: 5px 9px;
    border-radius: 6px;
    font-size: 11px;
    color: #ccc;
    line-height: 1.6;
  }
  #conn-indicator {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }
  #conn-indicator.connected { background: #4caf50; }

  /* ── Right column: overhead + map ── */
  #side-panels {
    display: flex;
    flex-direction: column;
    background: #111;
    border-right: 1px solid #222;
    overflow: hidden;
  }
  .side-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .side-block + .side-block {
    border-top: 1px solid #222;
  }
  .side-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 5px 8px 3px;
    flex-shrink: 0;
  }
  .side-canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 4px;
  }
  .side-canvas-wrap canvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  /* ── Chat panel ── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    background: #141414;
    overflow: hidden;
  }
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    max-width: 90%;
    padding: 7px 11px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a4a1a;
    color: #b9f0b9;
    border-radius: 12px 12px 2px 12px;
  }
  .msg.robot {
    align-self: flex-start;
    background: #1e2a3a;
    color: #a8d4f0;
    border-radius: 12px 12px 12px 2px;
  }
  .msg.system {
    align-self: center;
    background: #252525;
    color: #888;
    font-size: 11px;
    padding: 3px 9px;
  }
  .msg.thought {
    align-self: flex-start;
    background: #1a1a2e;
    border-left: 2px solid #5a4a8a;
    color: #9a8abf;
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 4px 12px 12px 4px;
    max-width: 96%;
  }
  .msg.thought .t-header {
    font-size: 10px;
    color: #6a5a9a;
    margin-bottom: 2px;
    font-family: monospace;
  }
  .msg.thought .t-reason { font-style: italic; }
  .msg.thought.vlm-raw {
    background: #0f100a;
    border-left-color: #4a5020;
    opacity: 0.85;
  }
  .msg.thought.vlm-raw .t-reason {
    font-family: monospace;
    font-size: 10px;
    font-style: normal;
    color: #7a8a40;
    word-break: break-all;
    white-space: pre-wrap;
  }

  #input-area {
    padding: 10px;
    border-top: 1px solid #222;
    display: flex;
    gap: 7px;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 7px 11px;
    font-size: 13px;
    outline: none;
    resize: none;
  }
  #msg-input:focus { border-color: #4a8a4a; }
  #send-btn {
    background: #2a5a2a;
    border: none;
    border-radius: 8px;
    color: #a8f0a8;
    padding: 7px 13px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send-btn:hover:not(:disabled) { background: #3a7a3a; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Odysseus</h1>
  <span id="status-badge">待机</span>
</header>
<main>
  <!-- Ego RGB -->
  <div id="video-panel">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="nav-info">
      <span id="info-skill">—</span> &nbsp;|&nbsp; 步数 <span id="info-step">0</span>
    </div>
    <div id="conn-indicator" title="WebSocket 状态"></div>
  </div>

  <!-- Topo + Map -->
  <div id="side-panels">
    <div class="side-block">
      <div class="side-label">拓扑地图 / Topo</div>
      <div class="side-canvas-wrap">
        <canvas id="topo-canvas" width="320" height="320"></canvas>
      </div>
    </div>
    <div class="side-block">
      <div class="side-label">探索热力图 / Map</div>
      <div class="side-canvas-wrap">
        <canvas id="map-canvas" width="400" height="400"></canvas>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-messages">
      <div class="msg system">机器人已就绪，请输入导航指令</div>
    </div>
    <div id="input-area">
      <textarea id="msg-input" rows="2" placeholder="请到沙发旁边…"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>
</main>

<script>
const canvas     = document.getElementById('canvas');
const topoCanvas = document.getElementById('topo-canvas');
const mapCanvas  = document.getElementById('map-canvas');
const ctx        = canvas.getContext('2d');
const ctxTopo    = topoCanvas.getContext('2d');
const ctxMap     = mapCanvas.getContext('2d');

const statusBadge   = document.getElementById('status-badge');
const infoSkill     = document.getElementById('info-skill');
const infoStep      = document.getElementById('info-step');
const connIndicator = document.getElementById('conn-indicator');
const chatMessages  = document.getElementById('chat-messages');
const msgInput      = document.getElementById('msg-input');
const sendBtn       = document.getElementById('send-btn');

let ws = null;
let navigating = false;

// ── WebSocket ─────────────────────────────────────────────────

const SKILL_ICON  = {snap:'⚡', explore:'🔍', escape:'🚪', verify:'✅', sensor:'📡', plan:'🗺', vlm_raw:'🔬'};
const SKILL_LABEL = {snap:'锁定目标', explore:'探索', escape:'突围', verify:'确认到达', sensor:'传感器', plan:'策略', vlm_raw:'VLM输出'};

function drawToCanvas(c, ctx2d, b64, mime) {
  const img = new Image();
  img.onload = () => ctx2d.drawImage(img, 0, 0, c.width, c.height);
  img.src = `data:${mime};base64,` + b64;
}

function addThought(step, skill, reason, extra) {
  const div = document.createElement('div');
  div.className = 'msg thought' + (skill === 'vlm_raw' ? ' vlm-raw' : '');
  const icon  = SKILL_ICON[skill]  || '💭';
  const label = SKILL_LABEL[skill] || skill;
  let header = `${icon} <b>${label}</b> · step ${step}`;
  if (extra && extra.room) header += ` · 📍${extra.room}`;
  div.innerHTML = `<div class="t-header">${header}</div>`
                + `<div class="t-reason">${reason}</div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connIndicator.classList.add('connected');
    addMsg('system', '连接成功');
  };

  ws.onclose = () => {
    connIndicator.classList.remove('connected');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'frame') {
      drawToCanvas(canvas, ctx, data.img, 'image/jpeg');
      updateNav(data);
    } else if (data.type === 'topo') {
      drawToCanvas(topoCanvas, ctxTopo, data.img, 'image/png');
    } else if (data.type === 'map') {
      drawToCanvas(mapCanvas, ctxMap, data.img, 'image/png');
    } else if (data.type === 'thought') {
      addThought(data.step, data.skill, data.reason, data);
    } else if (data.type === 'status') {
      handleStatus(data);
    }
  };
}

function updateNav(data) {
  infoSkill.textContent = data.skill || '—';
  infoStep.textContent  = data.step  || 0;
  if (data.status === 'navigating') {
    statusBadge.textContent = `导航中 → ${data.goal}`;
    statusBadge.className   = 'navigating';
  }
}

function handleStatus(data) {
  navigating = false;
  sendBtn.disabled = false;
  if (data.status === 'arrived') {
    statusBadge.textContent = '已到达';
    statusBadge.className   = 'arrived';
    addMsg('robot', data.message || '我已到达，还需要什么？');
  } else if (data.status === 'timeout') {
    statusBadge.textContent = '导航超时';
    statusBadge.className   = 'timeout';
    addMsg('robot', data.message || '导航超时，未能到达目标。');
  }
}

// ── Send command ──────────────────────────────────────────────

async function sendCommand() {
  const text = msgInput.value.trim();
  if (!text || navigating) return;

  addMsg('user', text);
  msgInput.value   = '';
  navigating       = true;
  sendBtn.disabled = true;
  statusBadge.textContent = '处理中…';
  statusBadge.className   = '';

  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    const data = await res.json();
    if (!data.ok) {
      addMsg('robot', `错误：${data.error}`);
      navigating       = false;
      sendBtn.disabled = false;
      statusBadge.textContent = '错误';
      statusBadge.className   = '';
    } else {
      addMsg('system', `开始导航 → ${data.goal}`);
    }
  } catch(err) {
    addMsg('robot', '网络错误，请重试');
    navigating       = false;
    sendBtn.disabled = false;
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className  = `msg ${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── Events ────────────────────────────────────────────────────

sendBtn.addEventListener('click', sendCommand);
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCommand(); }
});

connect();
</script>
</body>
</html>
