<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odysseus — 家居导航机器人</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  #status-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    background: #333;
    color: #aaa;
    transition: all 0.3s;
  }
  #status-badge.navigating { background: #1a3a1a; color: #4caf50; }
  #status-badge.arrived    { background: #1a2a3a; color: #64b5f6; }
  #status-badge.timeout    { background: #3a1a1a; color: #ef9a9a; }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    position: relative;
  }
  #canvas {
    max-width: 100%;
    max-height: calc(100vh - 120px);
    border: 1px solid #222;
  }
  #nav-info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.65);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: #ccc;
    line-height: 1.6;
  }
  #conn-indicator {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }
  #conn-indicator.connected { background: #4caf50; }

  #chat-panel {
    width: 300px;
    border-left: 1px solid #222;
    display: flex;
    flex-direction: column;
    background: #141414;
  }
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a4a1a;
    color: #b9f0b9;
    border-radius: 12px 12px 2px 12px;
  }
  .msg.robot {
    align-self: flex-start;
    background: #1e2a3a;
    color: #a8d4f0;
    border-radius: 12px 12px 12px 2px;
  }
  .msg.system {
    align-self: center;
    background: #252525;
    color: #888;
    font-size: 12px;
    padding: 4px 10px;
  }
  .msg.thought {
    align-self: flex-start;
    background: #1a1a2e;
    border-left: 2px solid #5a4a8a;
    color: #9a8abf;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px 12px 12px 4px;
    max-width: 95%;
  }
  .msg.thought .t-header {
    font-size: 11px;
    color: #6a5a9a;
    margin-bottom: 2px;
    font-family: monospace;
  }
  .msg.thought .t-reason { font-style: italic; }

  #input-area {
    padding: 12px;
    border-top: 1px solid #222;
    display: flex;
    gap: 8px;
  }
  #msg-input {
    flex: 1;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
    resize: none;
  }
  #msg-input:focus { border-color: #4a8a4a; }
  #send-btn {
    background: #2a5a2a;
    border: none;
    border-radius: 8px;
    color: #a8f0a8;
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send-btn:hover:not(:disabled) { background: #3a7a3a; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Odysseus</h1>
  <span id="status-badge">待机</span>
</header>
<main>
  <div id="video-panel">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="nav-info">
      <span id="info-skill">—</span> &nbsp;|&nbsp; 步数 <span id="info-step">0</span>
    </div>
    <div id="conn-indicator" title="WebSocket 状态"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-messages">
      <div class="msg system">机器人已就绪，请输入导航指令</div>
    </div>
    <div id="input-area">
      <textarea id="msg-input" rows="2" placeholder="请到沙发旁边…"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>
</main>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusBadge = document.getElementById('status-badge');
const infoSkill = document.getElementById('info-skill');
const infoStep = document.getElementById('info-step');
const connIndicator = document.getElementById('conn-indicator');
const chatMessages = document.getElementById('chat-messages');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

let ws = null;
let navigating = false;

// ── WebSocket ─────────────────────────────────────────────────

const SKILL_ICON = {snap:'⚡',explore:'🔍',escape:'🚪',verify:'✅'};

function addThought(step, skill, reason) {
  const div = document.createElement('div');
  div.className = 'msg thought';
  const icon = SKILL_ICON[skill] || '💭';
  div.innerHTML = `<div class="t-header">${icon} ${skill} · step ${step}</div>`
                + `<div class="t-reason">${reason}</div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connIndicator.classList.add('connected');
    addMsg('system', '连接成功');
  };

  ws.onclose = () => {
    connIndicator.classList.remove('connected');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'frame') {
      drawFrame(data.img);
      updateNav(data);
    } else if (data.type === 'thought') {
      addThought(data.step, data.skill, data.reason);
    } else if (data.type === 'status') {
      handleStatus(data);
    }
  };
}

function drawFrame(b64) {
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  img.src = 'data:image/jpeg;base64,' + b64;
}

function updateNav(data) {
  infoSkill.textContent = data.skill || '—';
  infoStep.textContent = data.step || 0;

  if (data.status === 'navigating') {
    statusBadge.textContent = `导航中 → ${data.goal}`;
    statusBadge.className = 'navigating';
  }
}

function handleStatus(data) {
  navigating = false;
  sendBtn.disabled = false;

  if (data.status === 'arrived') {
    statusBadge.textContent = '已到达';
    statusBadge.className = 'arrived';
    addMsg('robot', data.message || '我已到达，还需要什么？');
  } else if (data.status === 'timeout') {
    statusBadge.textContent = '导航超时';
    statusBadge.className = 'timeout';
    addMsg('robot', data.message || '导航超时，未能到达目标。');
  }
}

// ── 发送指令 ──────────────────────────────────────────────────

async function sendCommand() {
  const text = msgInput.value.trim();
  if (!text || navigating) return;

  addMsg('user', text);
  msgInput.value = '';
  navigating = true;
  sendBtn.disabled = true;
  statusBadge.textContent = '处理中…';
  statusBadge.className = '';

  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    const data = await res.json();
    if (!data.ok) {
      addMsg('robot', `错误：${data.error}`);
      navigating = false;
      sendBtn.disabled = false;
      statusBadge.textContent = '错误';
      statusBadge.className = '';
    } else {
      addMsg('system', `开始导航 → ${data.goal}`);
    }
  } catch(err) {
    addMsg('robot', '网络错误，请重试');
    navigating = false;
    sendBtn.disabled = false;
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── 事件绑定 ──────────────────────────────────────────────────

sendBtn.addEventListener('click', sendCommand);
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendCommand();
  }
});

connect();
</script>
</body>
</html>
